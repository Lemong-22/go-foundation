func main() {
	ctx, stop := signal.NotifyContext(context.Background(), os.Interrupt, syscall.SIGTERM)
	defer stop()

	command := newRootCommand(ctx)
	if err := command.ExecuteContext(ctx); err != nil {
		_, _ = fmt.Fprintln(os.Stderr, "Error:", err)
		os.Exit(coursecli.ExitCode(err))
	}
}

func newRootCommand(ctx context.Context) *cobra.Command {
	config := app.ConfigureViper(viper.New())
	scope := &containerScope{ctx: ctx, config: config}

	command := &cobra.Command{
		Use:           "course-cli",
		Short:         "Manage courses, lessons, quizzes, practices, and tests",
		SilenceUsage:  true,
		SilenceErrors: true,
	}
	command.PersistentFlags().String("db-url", "", "PostgreSQL connection string")
	command.PersistentFlags().String("api-token", "", "REST API bearer token")
	_ = config.BindPFlag("db-url", command.PersistentFlags().Lookup("db-url"))
	_ = config.BindPFlag("api-token", command.PersistentFlags().Lookup("api-token"))

	command.PersistentPostRun = func(*cobra.Command, []string) {
		scope.Close()
	}

	command.AddCommand(
		coursecli.NewCourseCommand(coursecli.CourseCommandOptions{
			Service: deferredCourseService{scope: scope},
			Config:  config,
		}),
		// ... lesson, quiz, practice, test, import commands (same pattern) ...
		newMigrateCommand(ctx, config),
		newPlaygroundCommand(ctx, scope, config),
		newRestCommand(ctx, scope),
	)

	return command
}

<script type="text/plain" id="a3">
func (scope *containerScope) Container() (*app.CLI, error) {
	scope.mu.Lock()
	defer scope.mu.Unlock()

	if scope.container != nil {
		return scope.container, nil
	}

	cfg, err := app.LoadConfig(scope.config)
	if err != nil {
		return nil, err
	}

	container, err := app.BuildContainer(scope.ctx, cfg)
	if err != nil {
		return nil, err
	}

	scope.container = container
	return container, nil
}
</script>

	return container.Course.CreateCourse(in)
}

<script type="text/plain" id="a4">
func ConfigureViper(config *viper.Viper) *viper.Viper {
	if config == nil {
		config = viper.New()
	}

	if config.ConfigFileUsed() == "" {
		config.SetConfigName(configName)
		config.SetConfigType(configType)
		if home, err := os.UserHomeDir(); err == nil {
			config.AddConfigPath(filepath.Join(home, configDirectory))
		}
	}

	config.SetEnvPrefix(envPrefix)
	config.SetEnvKeyReplacer(strings.NewReplacer("-", "_"))
	config.AutomaticEnv()

	config.SetDefault(dbURLKey, "")
	config.SetDefault(instructorKey, "")
	config.SetDefault(apiTokenKey, "")

	return config
}
</script>

	pool, err := newPostgresPool(ctx, cfg.DBURL)
	if err != nil {
		return nil, err
	}

	courseRepo := postgres.NewPostgresCourseRepository(pool)
	lessonRepo := postgres.NewPostgresLessonRepository(pool)
	quizRepo := postgres.NewPostgresQuizRepository(pool)
	practiceRepo := postgres.NewPostgresPracticeRepository(pool)

	ids := NewUUIDGenerator()
	clock := NewSystemClock()
	importSource := importsource.NewZipImportSource()

	courseService := usecase.NewCourseService(courseRepo, lessonRepo, quizRepo, ids, clock, practiceRepo, testRepo)
	lessonService := usecase.NewLessonService(courseRepo, lessonRepo, quizRepo, ids, clock, practiceRepo)
	quizService := usecase.NewQuizService(courseRepo, lessonRepo, quizRepo, ids, clock)
	practiceService := usecase.NewPracticeService(courseRepo, lessonRepo, practiceRepo, ids, clock)
	testService := usecase.NewTestService(courseRepo, testRepo, ids, clock)
	importService := usecase.NewImportService(
		importSource, clock,
		// ... all five repos, then all five services as collaborators ...
	)

	return &CLI{
		Course:   courseService,
		Lesson:   lessonService,
		Quiz:     quizService,
		Practice: practiceService,
		Test:     testService,
		Import:   importService,
		Config:   cfg,
		pool:     pool,
	}, nil

<script type="text/plain" id="a7">
func newRestCommand(ctx context.Context, scope *containerScope) *cobra.Command {
	address := rest.DefaultAddress
	command := &cobra.Command{
		Use:   "rest",
		Short: "Serve the REST API",
		Args:  cobra.NoArgs,
		RunE: func(*cobra.Command, []string) error {
			container, err := scope.Container()
			if err != nil {
				return err
			}

			server, err := rest.NewServer(rest.Options{
				Course:       container.Course,
				Lesson:       container.Lesson,
				Quiz:         container.Quiz,
				Practice:     container.Practice,
				Test:         container.Test,
				Import:       container.Import,
				Token:        container.Config.APIToken,
				InstructorID: container.Config.InstructorID,
			})
			if err != nil {
				return err
			}

			_, _ = fmt.Fprintf(os.Stdout, "Course REST API listening on http://%s\n", address)
			return server.ListenAndServe(ctx, address)
		},
	}
	command.Flags().StringVar(&address, "addr", rest.DefaultAddress, "address to bind")

	return command
}

func NewServer(options Options) (*Server, error) {
	token := strings.TrimSpace(options.Token)
	if options.Course == nil {
		return nil, ErrMissingCourseService
	}
	if options.Lesson == nil {
		return nil, ErrMissingLessonService
	}
	// ... quiz, practice, test checked the same way ...
	if token == "" {
		return nil, ErrMissingAPIToken
	}

	return &Server{
		course:       options.Course,
		lesson:       options.Lesson,
		quiz:         options.Quiz,
		practice:     options.Practice,
		test:         options.Test,
		imports:      options.Import,
		token:        token,
		instructorID: strings.TrimSpace(options.InstructorID),
	}, nil
}

<script type="text/plain" id="a9">
func (server *Server) Handler() http.Handler {
	return server.authenticate(http.HandlerFunc(server.route))
}

func (server *Server) ListenAndServe(ctx context.Context, address string) error {
	if strings.TrimSpace(address) == "" {
		address = DefaultAddress // 127.0.0.1:8788
	}

	listener, err := net.Listen("tcp", address)
	if err != nil {
		return fmt.Errorf("listen on %s: %w", address, err)
	}

	httpServer := &http.Server{
		Handler:           server.Handler(),
		ReadHeaderTimeout: 5 * time.Second,
	}

	errCh := make(chan error, 1)
	go func() {
		errCh <- httpServer.Serve(listener)
	}()

	select {
	case err := <-errCh:
		if errors.Is(err, http.ErrServerClosed) {
			return nil
		}
		return err
	case <-ctx.Done():
		shutdownCtx, cancel := context.WithTimeout(context.Background(), 5*time.Second)
		defer cancel()
		if err := httpServer.Shutdown(shutdownCtx); err != nil {
			return fmt.Errorf("shutdown rest server: %w", err)
		}
	}
	// ...
}
</script>

<script type="text/plain" id="a10">
func (server *Server) authenticate(next http.Handler) http.Handler {
	return http.HandlerFunc(func(response http.ResponseWriter, request *http.Request) {
		if !server.authorized(request.Header.Get("Authorization")) {
			writeError(response, ErrUnauthorized)
			return
		}

		next.ServeHTTP(response, request)
	})
}

func (server *Server) authorized(header string) bool {
	scheme, token, ok := strings.Cut(header, " ")
	if !ok || scheme != "Bearer" {
		return false
	}

	return subtle.ConstantTimeCompare([]byte(token), []byte(server.token)) == 1
}
</script>

<script type="text/plain" id="a11">
func (server *Server) route(response http.ResponseWriter, request *http.Request) {
	segments := pathSegments(request.URL.Path)
	if len(segments) == 0 || segments[0] != "v1" {
		http.NotFound(response, request)
		return
	}

	switch {
	case len(segments) == 3 && segments[1] == "import" && segments[2] == "plan":
		server.handleImportPlan(response, request)
	case len(segments) == 3 && segments[1] == "import" && segments[2] == "apply":
		server.handleImportApply(response, request)
	case len(segments) == 2 && segments[1] == "courses":
		server.handleCourses(response, request)
	case len(segments) == 4 && segments[1] == "courses" && segments[3] == "lessons":
		server.handleCourseLessons(response, request, segments[2])
	case len(segments) == 3 && segments[1] == "courses":
		server.handleCourse(response, request, segments[2])
	case len(segments) == 3 && segments[1] == "lessons":
		server.handleLesson(response, request, segments[2])
	case len(segments) == 3 && segments[1] == "tests":
		server.handleTest(response, request, segments[2])
	case len(segments) == 4 && segments[1] == "lessons" && segments[3] == "blocks":
		server.handleLessonBlocks(response, request, segments[2])
	// ... ~15 more cases: publish/unpublish, reorder, quizzes,
	//     questions, practices, testcases, test items, blocks ...
	default:
		http.NotFound(response, request)
	}
}
</script>

const courseApi = createCourseApiClient({

export const getCourse = courseApi.getCourse;
export const getLesson = courseApi.getLesson;
export const listCourseLessons = courseApi.listCourseLessons;

function readCourseApiSettings(): CourseApiResult<{ baseUrl?: string; token: string }> {
  const token = process.env.COURSE_CLI_API_TOKEN?.trim();

  if (!token) {
    return {
      error: {
        code: "configuration",
        message: "COURSE_CLI_API_TOKEN is required for course API reads.",
      },

<script type="text/plain" id="b13b">
// learnerReadRequested defines the L2 read contract: omitted view and
// ?view=instructor preserve full-fidelity instructor responses, while
// ?view=learner serializes only the DTOs below at the REST boundary.
func learnerReadRequested(request *http.Request) (bool, error) {
	view := strings.TrimSpace(request.URL.Query().Get(readViewQueryParam))
	switch view {
	case "", instructorReadView:
		return false, nil
	case learnerReadView:
		return true, nil
	default:
		return false, domain.NewValidationError(readViewQueryParam, "must be learner or instructor")
	}
}

func (server *Server) ensureLearnerCoursePublished(courseID string) error {
	out, err := server.course.GetCourse(core.GetCourseInput{ID: courseID})
	if err != nil {
		return err
	}

	if out.Course.Status != domain.Published().String() {
		return domain.ErrNotFound
	}

	return nil
}
</script>

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

const GO_KW = /\b(func|return|if|else|for|range|switch|case|default|type|struct|interface|const|var|import|package|defer|go|select|chan|map|nil|err|error|string|int|bool|byte|any|float64|true|false)\b/g;
const TS_KW = /\b(export|import|from|const|let|var|function|return|if|else|for|of|async|await|type|interface|extends|new|try|catch|default|switch|case|null|undefined|true|false|string|number|boolean|unknown|never|as|typeof)\b/g;

function highlight(line, lang) {
  let s = esc(line);
  // comments first
  const cm = s.match(/^(\s*)(\/\/.*)$/);
  if (cm) return cm[1] + '<span class="tok-c">' + cm[2] + "</span>";
  // strings
  s = s.replace(/(&quot;.*?&quot;|`[^`]*`?|'[^']*')/g, '<span class="tok-s">$1</span>');
  // keywords (skip inside spans crudely: apply only to segments outside tags)
  const kw = lang === "go" ? GO_KW : TS_KW;
  s = s.split(/(<span class="tok-s">.*?<\/span>)/g).map(seg =>
    seg.startsWith('<span') ? seg : seg.replace(kw, '<span class="tok-k">$1</span>')
  ).join("");
  // trailing // comments
  s = s.replace(/(\s)(\/\/(?:(?!&).)*)$/, '$1<span class="tok-c">$2</span>');
  return s;
}

function codeBlock(ref) {
  const node = document.getElementById(ref.id);
  let text = node ? node.textContent : "(missing excerpt)";
  text = text.replace(/^\n/, "").replace(/\n\s*$/, "");
  const lines = text.split("\n");
  const elided = text.includes("...");
  const rows = lines.map((ln, i) =>
    `<div class="row"><span class="gut">${elided && i > 0 ? "·" : ref.start + i}</span><span class="src">${highlight(ln, ref.lang)}</span></div>`
  ).join("");
  const range = elided ? `:${ref.start}… (trimmed)` : `:${ref.start}–${ref.start + lines.length - 1}`;
  return `<div class="filechip">${esc(ref.file)} <span class="ln">${range}</span></div>
  <pre class="code">${rows}</pre>`;
}

/* ---------------- flowchart rendering ---------------- */

const NW = 176, NH = 54, PITCH = 200, RH = 96, MX = 44, MY = 30;
const fX = c => MX + c * PITCH;          // node left
const fCX = c => fX(c) + NW / 2;         // node center x
const fY = r => MY + r * RH;             // node top
const fCY = r => fY(r) + NH / 2;         // node center y

function anchor(node, toward) {
  const cx = fCX(node.c), cy = fCY(node.r);
  const dx = toward.x - cx, dy = toward.y - cy;
  if (Math.abs(dy) * (NW / 2) > Math.abs(dx) * (NH / 2)) {
    return { x: cx, y: cy + Math.sign(dy) * (NH / 2) };
  }
  return { x: cx + Math.sign(dx) * (NW / 2), y: cy };
}

function edgeSVG(e, byId) {
  const s = byId[e.from], t = byId[e.to];
  const cls = "fedge" + (e.dashed ? " dash" : "");
  let d, lx, ly;

  if (e.arc) {
    // same-row arc above the nodes
    const sx = fCX(s.c) + NW / 2, sy = fCY(s.r);
    const tx = fCX(t.c) - NW / 2, ty = fCY(t.r);
    const lift = 52;
    d = `M ${sx} ${sy} C ${sx + 40} ${sy - lift}, ${tx - 40} ${ty - lift}, ${tx} ${ty}`;
    lx = (sx + tx) / 2; ly = sy - lift + 8;
  } else {
    const vias = (e.via || []).map(([c, r]) => ({ x: fCX(c), y: fCY(r) }));
    const firstToward = vias[0] || { x: fCX(t.c), y: fCY(t.r) };
    const lastToward = vias[vias.length - 1] || { x: fCX(s.c), y: fCY(s.r) };
    const p0 = anchor(s, firstToward);
    const pn = anchor(t, lastToward);
    const pts = [p0, ...vias, pn];
    d = "M " + pts.map(p => `${p.x} ${p.y}`).join(" L ");
    const mi = Math.floor((pts.length - 1) / 2);
    lx = (pts[mi].x + pts[mi + 1].x) / 2;
    ly = (pts[mi].y + pts[mi + 1].y) / 2 - 6;
  }

  const label = e.label
    ? `<text class="flabel" x="${lx}" y="${ly}" text-anchor="middle">${esc(e.label)}</text>`
    : "";
  return `<path class="${cls}" d="${d}" marker-end="url(#arr)"/>${label}`;
}

function renderFlow() {
  const flow = FLOWS[state.trace];
  const sel = state.sel[state.trace];
  const byId = {};
  flow.nodes.forEach(n => { byId[n.id] = n; });

  const maxC = Math.max(...flow.nodes.map(n => n.c),
    ...flow.edges.flatMap(e => (e.via || []).map(v => v[0])));
  const maxR = Math.max(...flow.nodes.map(n => n.r),
    ...flow.edges.flatMap(e => (e.via || []).map(v => v[1])));
  const W = fX(maxC) + NW + MX;
  const H = fY(maxR) + NH + MY + 10;

  const bands = flow.lanes.map(l =>
    `<rect class="lane-band" x="0" y="${fY(l.r) - 17}" width="${W}" height="${NH + 34}" ${l.r % 2 ? "" : 'opacity="0"'}/>
     <text class="lane-label" x="10" y="${fY(l.r) - 4}">${esc(l.label)}</text>`
  ).join("");

  const edges = flow.edges.map(e => edgeSVG(e, byId)).join("");

  const nodes = flow.nodes.map(n => {
    const x = fX(n.c), y = fY(n.r);
    const subT = n.sub
      ? `<text class="sub" x="${x + NW / 2}" y="${y + 40}" text-anchor="middle">${esc(n.sub)}</text>`
      : "";
    const labelY = n.sub ? y + 23 : y + 32;
    return `<g class="fnode${n.id === sel ? " sel" : ""}" data-id="${n.id}">
      <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="9" stroke="${GROUP_COLOR[n.g]}"/>
      <text x="${x + NW / 2}" y="${labelY}" text-anchor="middle">${esc(n.label)}</text>${subT}</g>`;
  }).join("");

  elFsvgwrap.innerHTML =
    `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#52617f"/></marker></defs>
      ${bands}${edges}${nodes}</svg>`;

  elFsvgwrap.querySelectorAll(".fnode").forEach(g =>
    g.addEventListener("click", ev => {
      ev.stopPropagation();
      state.sel[state.trace] = g.dataset.id;
      render();
    }));

  renderFlowPanel(byId);
}

function renderFlowPanel(byId) {
  const sel = state.sel[state.trace];
  const trace = TRACES[state.trace];
  const node = sel ? byId[sel] : null;

  if (!node) {
    elFlowpanel.innerHTML = `<p class="fp-hint">Click any node in the flowchart to see what it does, which files implement it, and jump to the matching walkthrough step.</p>`;
    return;
  }

  const files = node.files.length
    ? `<div class="fp-files">${node.files.map(f => `<div>${esc(f)}</div>`).join("")}</div>`
    : "";
  const steps = node.steps.map(i =>
    `<button data-step="${i - 1}"><span class="sn">${String(i).padStart(2, "0")}</span>${esc(trace.steps[i - 1].title)} →</button>`
  ).join("");

  elFlowpanel.innerHTML =
    `<span class="fp-group" style="--fp-c:${GROUP_COLOR[node.g]}">${esc(GROUP_NAME[node.g])}</span>
     <h3>${esc(node.label)}</h3>
     <div class="fp-desc"><p>${esc(node.desc)}</p></div>
     ${files}
     <div class="fp-steps">${steps}</div>`;

  elFlowpanel.querySelectorAll("[data-step]").forEach(b =>
    b.addEventListener("click", () => {
      state.view = "steps";
      state.step[state.trace] = parseInt(b.dataset.step, 10);
      render();
    }));
}

/* ---------------- main render ---------------- */

function render() {
  const trace = TRACES[state.trace];
  const si = state.step[state.trace];
  const step = trace.steps[si];
  const isFlow = state.view === "flow";

  // tabs + view toggle
  document.querySelectorAll(".tab").forEach((b, i) =>
    b.classList.toggle("active", i === state.trace));
  document.querySelectorAll(".vtoggle button").forEach(b =>
    b.classList.toggle("on", b.dataset.view === state.view));

  // view visibility
  elFlowview.hidden = !isFlow;
  elMapbar.hidden = isFlow;
  elLayout.hidden = isFlow;
  elFooter.hidden = isFlow;

  if (isFlow) {
    if (!state.sel[state.trace]) state.sel[state.trace] = FLOWS[state.trace].nodes[0].id;
    renderFlow();
    return;
  }

  // map
  elMap.innerHTML = trace.nodes.map((n, i) => {
    const on = step.nodes.includes(i);
    const lane = n.lane ? " lane" : "";
    const sep = i === 0 ? "" : (n.lane ? '<span class="arrow">‖</span>' : '<span class="arrow">→</span>');
    return `${sep}<span class="node${on ? " on" : ""}${lane}" style="--node-c:${GROUP_COLOR[n.g]}">${esc(n.t)}</span>`;
  }).join("");

  // toc
  elToc.innerHTML = trace.steps.map((s, i) =>
    `<button class="${i === si ? "cur" : ""}" data-i="${i}"><span class="num">${String(i + 1).padStart(2, "0")}</span>${esc(s.title)}</button>`
  ).join("");
  elToc.querySelectorAll("button").forEach(b =>
    b.addEventListener("click", () => go(parseInt(b.dataset.i, 10))));

  // main
  elMain.innerHTML =
    `<div class="stepkicker">Trace ${trace.name} · Step ${si + 1} of ${trace.steps.length}</div>
     <h2>${esc(step.title)}</h2>
     <div class="prose">${step.prose}</div>
     ${step.code.map(codeBlock).join("")}`;

  elPos.textContent = `${si + 1} / ${trace.steps.length}`;
  btnPrev.disabled = si === 0;
  btnNext.disabled = si === trace.steps.length - 1;
  window.scrollTo({ top: 0 });
}

function go(i) {
  const max = TRACES[state.trace].steps.length - 1;
  state.step[state.trace] = Math.max(0, Math.min(max, i));
  render();
}

document.querySelectorAll(".tab").forEach((b, i) =>
  b.addEventListener("click", () => { state.trace = i; render(); }));
document.querySelectorAll(".vtoggle button").forEach(b =>
  b.addEventListener("click", () => { state.view = b.dataset.view; render(); }));
btnPrev.addEventListener("click", () => go(state.step[state.trace] - 1));
btnNext.addEventListener("click", () => go(state.step[state.trace] + 1));
document.addEventListener("keydown", e => {
  if (state.view !== "steps") {
    if (e.key === "Escape") { state.sel[state.trace] = null; render(); }
    return;
  }
  if (e.key === "ArrowRight") go(state.step[state.trace] + 1);
  if (e.key === "ArrowLeft") go(state.step[state.trace] - 1);
});

render();
</script>
</body>
</html>
