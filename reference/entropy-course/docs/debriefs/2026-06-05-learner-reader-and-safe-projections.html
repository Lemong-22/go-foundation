<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Checkpoint · Learner reader + answer-safe reads</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1c2230; --muted:#69728a; --faint:#9aa3b6;
    --border:#e3e7ee; --border-strong:#cfd5e1;
    --accent:#4f46e5; --accent-soft:#eef0fe; --accent-ink:#3b34c0;
    --ok:#1f9d63; --ok-soft:#e7f6ee;
    --warn:#b9770b; --warn-soft:#fdf3dd; --warn-stroke:#cc8800;
    --bad:#c0392b; --bad-soft:#fae9e7;
    --node:#ffffff; --node-shadow:rgba(28,34,48,.08);
    --radius:12px; --shadow:0 1px 2px rgba(28,34,48,.05),0 6px 20px rgba(28,34,48,.06);
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f1117; --panel:#171a22; --ink:#e7ebf2; --muted:#9aa3b6; --faint:#6b7488;
      --border:#272b36; --border-strong:#363c4a;
      --accent:#8b87ff; --accent-soft:#20223a; --accent-ink:#b6b3ff;
      --ok:#46c486; --ok-soft:#16271e; --warn:#e0a93c; --warn-soft:#2b2415; --warn-stroke:#e0a93c;
      --bad:#f08a7d; --bad-soft:#2a1816;
      --node:#1c2029; --node-shadow:rgba(0,0,0,.4);
      --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  .wrap{max-width:900px;margin:0 auto;padding:0 20px 80px}

  /* sticky header */
  header.bar{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:saturate(1.4) blur(10px);border-bottom:1px solid var(--border)}
  .bar-inner{max-width:900px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .bar .pill{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent-soft);padding:3px 9px;border-radius:999px}
  .bar h1{font-size:15px;margin:0;font-weight:650;flex:1;min-width:180px}
  .progress{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
  .meter{width:120px;height:6px;border-radius:99px;background:var(--border);overflow:hidden}
  .meter > i{display:block;height:100%;width:0;background:var(--accent);transition:width .3s ease}
  .btn{font:inherit;font-size:13px;font-weight:600;border:1px solid var(--border-strong);background:var(--panel);color:var(--ink);padding:7px 13px;border-radius:9px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary.ready{box-shadow:0 0 0 0 var(--accent);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 55%,transparent)}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}

  /* glance */
  .glance{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;margin:22px 0 18px}
  .glance .meta{display:flex;gap:8px 16px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin-bottom:12px}
  .glance .meta code{font-family:var(--mono);font-size:12px;color:var(--ink);background:var(--bg);padding:1px 6px;border-radius:5px}
  .glance h2{margin:0 0 8px;font-size:21px;line-height:1.3}
  .glance p.tldr{margin:0 0 14px;font-size:15.5px;color:var(--ink)}
  .headline{display:flex;gap:10px;align-items:flex-start;background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn-stroke) 45%,transparent);border-radius:10px;padding:12px 14px}
  .headline b{color:var(--warn)}
  .headline .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--warn);white-space:nowrap;padding-top:1px}

  /* sections */
  section.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin:14px 0;overflow:hidden}
  .sec-head{display:flex;align-items:center;gap:12px;padding:15px 20px;cursor:pointer;user-select:none}
  .sec-head:hover{background:color-mix(in srgb,var(--accent-soft) 40%,transparent)}
  .sec-head .chev{transition:transform .2s;color:var(--faint);font-size:13px}
  section.open .sec-head .chev{transform:rotate(90deg)}
  .sec-head h3{margin:0;font-size:15.5px;font-weight:650;flex:1}
  .sec-head .count{font-size:12px;color:var(--muted);font-weight:600;background:var(--bg);border:1px solid var(--border);padding:2px 8px;border-radius:99px}
  .sec-body{display:none;padding:4px 20px 20px}
  section.open .sec-body{display:block}
  .sec-body p{margin:.5em 0}
  .sec-body h4{margin:18px 0 6px;font-size:13.5px}

  /* shipped items */
  .ship{border-left:3px solid var(--ok);padding:8px 0 8px 14px;margin:12px 0}
  .ship.planned{border-left-color:var(--faint)}
  .ship .tag{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:99px;vertical-align:middle;margin-left:8px}
  .tag.shipped{background:var(--ok-soft);color:var(--ok)}
  .tag.planned{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
  .ship b{font-size:14.5px}

  /* flowchart */
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:4px 0 10px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .swatch{width:22px;height:13px;border-radius:4px;display:inline-block;border:1.5px solid var(--border-strong);background:var(--node)}
  .swatch.risk{background:var(--warn-soft);border-color:var(--warn-stroke)}
  .swatch.unshipped{background:transparent;border-style:dashed;border-color:var(--accent)}
  .chart-scroll{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--bg)}
  svg.flow{display:block;min-width:640px;width:100%;height:auto}
  .flow .edge{fill:none;stroke:var(--border-strong);stroke-width:1.6}
  .flow .edge.dashed{stroke:var(--accent);stroke-dasharray:5 5}
  .flow .elabel{font-family:var(--sans);font-size:10.5px;fill:var(--muted)}
  .flow .elabel-bg{fill:var(--bg)}
  .flow g.node{cursor:pointer}
  .flow g.node rect{fill:var(--node);stroke:var(--border-strong);stroke-width:1.5;rx:9;filter:drop-shadow(0 1px 1px var(--node-shadow))}
  .flow g.node text{font-family:var(--sans);font-size:12px;fill:var(--ink);text-anchor:middle;dominant-baseline:middle}
  .flow g.node.risk rect{fill:var(--warn-soft);stroke:var(--warn-stroke)}
  .flow g.node.unshipped rect{fill:transparent;stroke:var(--accent);stroke-dasharray:5 5}
  .flow g.node.unshipped text{fill:var(--accent-ink);font-style:italic}
  .flow g.node.sel rect{stroke:var(--accent);stroke-width:2.5}
  .flow g.node:hover rect{stroke:var(--accent)}
  #node-detail{margin-top:12px;padding:13px 15px;border:1px solid var(--border);border-radius:10px;background:var(--bg);font-size:13.5px;min-height:20px;color:var(--muted)}
  #node-detail.has b{color:var(--ink)}
  #node-detail .nd-rel{margin-top:7px;font-size:12px;color:var(--accent-ink)}

  /* verify checklist */
  .step{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
  .step:last-child{border-bottom:0}
  .step input[type=checkbox]{margin-top:3px;width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex:none}
  .step .s-body{flex:1;min-width:0}
  .step .s-text{font-size:14px}
  .step.done .s-text{color:var(--muted);text-decoration:line-through}
  .cmd{display:flex;align-items:center;gap:8px;margin-top:7px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 9px}
  .cmd code{font-family:var(--mono);font-size:12px;flex:1;overflow-x:auto;white-space:pre;color:var(--ink)}
  .cmd .copy{font-size:11px;font-weight:600;border:1px solid var(--border-strong);background:var(--panel);border-radius:6px;padding:3px 8px;cursor:pointer;color:var(--muted);flex:none}
  .cmd .copy:hover{color:var(--accent);border-color:var(--accent)}
  .proof{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  @media(max-width:620px){.proof{grid-template-columns:1fr}}
  .proof div{border:1px solid var(--border);border-radius:9px;padding:11px 13px;font-size:13px}
  .proof .h{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
  .proof .pv .h{color:var(--ok)} .proof .ut .h{color:var(--warn)}

  /* decision capture */
  .dec{border:1px solid var(--border);border-radius:11px;padding:14px 15px;margin:12px 0;background:var(--panel);transition:border-color .15s}
  .dec.decided{border-color:color-mix(in srgb,var(--accent) 40%,var(--border))}
  .dec .d-top{display:flex;gap:10px;align-items:baseline}
  .dec .rank{font-size:12px;font-weight:700;color:#fff;background:var(--accent);border-radius:7px;min-width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;flex:none}
  .dec .d-title{font-weight:650;font-size:15px}
  .dec .d-detail{font-size:13px;color:var(--muted);margin:6px 0 12px}
  .seg{display:inline-flex;border:1px solid var(--border-strong);border-radius:9px;overflow:hidden}
  .seg button{font:inherit;font-size:12.5px;font-weight:600;border:0;border-right:1px solid var(--border-strong);background:var(--panel);color:var(--muted);padding:7px 14px;cursor:pointer;transition:.12s}
  .seg button:last-child{border-right:0}
  .seg button:hover{background:var(--bg)}
  .seg button[aria-pressed=true][data-v=approve]{background:var(--ok-soft);color:var(--ok)}
  .seg button[aria-pressed=true][data-v=ack]{background:var(--ok-soft);color:var(--ok)}
  .seg button[aria-pressed=true][data-v=defer]{background:var(--warn-soft);color:var(--warn)}
  .seg button[aria-pressed=true][data-v=reject]{background:var(--bad-soft);color:var(--bad)}
  .d-controls{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .nextfeat{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);cursor:pointer}
  .nextfeat input{accent-color:var(--accent);cursor:pointer}
  textarea.note{display:block;width:100%;margin-top:11px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--ink);font:inherit;font-size:13px;padding:8px 10px;resize:vertical;min-height:38px}
  textarea.note:focus{outline:none;border-color:var(--accent)}

  .oq-add{display:flex;gap:8px;margin:6px 0 10px}
  .oq-add input{flex:1;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--ink);font:inherit;font-size:13.5px;padding:8px 10px}
  .oq-add input:focus{outline:none;border-color:var(--accent)}
  ul.oq{list-style:none;margin:0;padding:0}
  ul.oq li{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;padding:7px 0;border-bottom:1px solid var(--border)}
  ul.oq li button{margin-left:auto;border:0;background:none;color:var(--faint);cursor:pointer;font-size:15px;flex:none}
  ul.oq li button:hover{color:var(--bad)}
  .notyet{font-size:13px;color:var(--muted);font-style:italic;margin-top:8px}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);font-size:13px;font-weight:600;padding:10px 18px;border-radius:10px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{color:var(--faint);font-size:12px;text-align:center;margin-top:26px}
</style>
</head>
<body>
<header class="bar">
  <div class="bar-inner">
    <span class="pill">Checkpoint</span>
    <h1 id="h-feature">Loading…</h1>
    <div class="progress" title="Review progress">
      <span id="prog-text">0/0</span>
      <span class="meter"><i id="prog-bar"></i></span>
    </div>
    <button class="btn primary" id="copy-btn">Copy decisions</button>
  </div>
</header>

<div class="wrap">
  <div class="glance">
    <div class="meta" id="g-meta"></div>
    <h2 id="g-feature"></h2>
    <p class="tldr" id="g-tldr"></p>
    <div class="headline"><span class="lbl">Most important next</span><div id="g-headline"></div></div>
  </div>
  <div id="sections"></div>
  <footer>Interactive Checkpoint Debrief · acceleration-os pilot · renders from the embedded normalized JSON — fully offline</footer>
</div>
<div class="toast" id="toast"></div>

  ],
  "nextSteps": [
    { "rank": 1, "title": "Wire the reader to the learner projections", "detail": "Replace buildDummyActivity in lesson-reader.tsx and the test view with getLearnerQuiz/Practice/Test from web/src/lib/course-api/server. Everything is staged (contract, BFF methods, regression tests); it's the only thing between 'demo' and 'real product'. Spec: docs/learner-safe-read-projections.md §Web BFF Handoff." },
    { "rank": 2, "title": "Load real course material (Phase C1)", "detail": "Run the import pipeline to publish an actual course. Until real content exists the reader can't be honestly evaluated; it also unblocks visual polish against design/course.html." },
    { "rank": 3, "title": "Commit the stray docs and push main", "detail": "Cheap, and removes the risk of losing the roadmap that defines this whole arc." }
  ],
  "notYet": "Learner attempts/grading/progress (explicitly deferred to a later phase), per-learner auth (token is the sole gate by decision #3), and a web authoring console (instructor authoring stays on the CLI this arc)."
}
</script>

<script>
"use strict";
const DEBRIEF = JSON.parse(document.getElementById('debrief-data').textContent);

/* ---------- ids + state ---------- */
function hash(str){let h=5381;for(let i=0;i<str.length;i++){h=((h<<5)+h)+str.charCodeAt(i);h&=0xffffffff;}return (h>>>0).toString(36);}
const nsId = t => 'ns_'+hash(t);
const leId = t => 'le_'+hash(t);
const DOC_ID = hash(DEBRIEF.meta.feature+'|'+DEBRIEF.meta.date);
const SKEY = 'icd:'+DOC_ID;

let state = { nextSteps:{}, looseEnds:{}, nextFeature:null, ticks:{}, openQuestions:[] };
try{ const s = JSON.parse(localStorage.getItem(SKEY)); if(s) state = Object.assign(state, s); }catch(e){}
function save(){ try{ localStorage.setItem(SKEY, JSON.stringify(state)); }catch(e){} updateProgress(); }

const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- header + glance ---------- */
const m = DEBRIEF.meta;
document.getElementById('h-feature').textContent = m.feature;
document.getElementById('g-feature').textContent = m.feature;
document.getElementById('g-tldr').textContent = DEBRIEF.tldr;
document.getElementById('g-headline').innerHTML = esc(DEBRIEF.headline);
document.getElementById('g-meta').innerHTML =
  `<span>📅 ${esc(m.date)}</span>`+
  `<span>⎇ <code>${esc(m.branch)}</code>${m.branchNote?' · '+esc(m.branchNote):''}</span>`+
  `<span>commits <code>${esc(m.commits)}</code></span>`+
  `<span>source <code>${esc(m.sourcePath)}</code></span>`;

/* ---------- collapsible section helper ---------- */
const root = document.getElementById('sections');
function section(id, title, count, openByDefault, bodyHTML){
  const sec = document.createElement('section');
  sec.className = 'card'+(openByDefault?' open':'');
  sec.innerHTML =
    `<div class="sec-head"><span class="chev">▶</span><h3>${esc(title)}</h3>`+
    (count!=null?`<span class="count">${esc(count)}</span>`:'')+`</div>`+
    `<div class="sec-body">${bodyHTML}</div>`;
  sec.querySelector('.sec-head').addEventListener('click',()=>sec.classList.toggle('open'));
  root.appendChild(sec);
  return sec;
}

/* ---------- Why ---------- */
section('why','Why this was built',null,false,`<p>${esc(DEBRIEF.why)}</p>`);

/* ---------- What shipped ---------- */
section('shipped','What actually shipped', DEBRIEF.shipped.length, false,
  DEBRIEF.shipped.map(s=>`<div class="ship ${s.status==='planned'?'planned':''}">`+
    `<b>${esc(s.label)}</b><span class="tag ${s.status}">${s.status==='planned'?'not shipped':'shipped'}</span>`+
    `<p>${esc(s.detail)}</p></div>`).join(''));

/* ---------- Flowchart (hand-authored SVG, data-driven) ---------- */
const flowSec = section('flow','The feature at a glance', DEBRIEF.graph.nodes.length+' nodes', true,
  `<div class="legend">`+
    `<span><i class="swatch"></i> shipped &amp; covered</span>`+
    `<span><i class="swatch unshipped"></i> planned, not shipped</span>`+
    `<span><i class="swatch risk"></i> shipped, needs wiring</span>`+
    `<span style="color:var(--faint)">click a node for detail</span>`+
  `</div><div class="chart-scroll"><div id="flow-mount"></div></div>`+
  `<div id="node-detail">Click any node to inspect what it does and where the soft spots are.</div>`);
renderGraph(document.getElementById('flow-mount'), document.getElementById('node-detail'));

function wrapText(label, max){
  const words = label.split(' '); const lines=[]; let cur='';
  for(const w of words){ if((cur+' '+w).trim().length>max){ if(cur)lines.push(cur); cur=w; } else cur=(cur+' '+w).trim(); }
  if(cur)lines.push(cur);
  if(lines.length>2){ lines.length=2; lines[1]=lines[1].replace(/.{0,1}$/,'')+'…'; }
  return lines;
}
function renderGraph(mount, detailEl){
  const g = DEBRIEF.graph;
  const W=940, padX=26, nodeW=172, nodeH=48, gapY=100, top=28, bottom=42;
  const maxLayer = Math.max(...g.nodes.map(n=>n.layer));
  const H = top + maxLayer*gapY + nodeH + bottom;
  const leftB=padX+nodeW/2, rightB=W-padX-nodeW/2, minSep=nodeW+14;
  const N = {};
  g.nodes.forEach(n=>{
    let cx = padX + n.col*(W-2*padX);
    cx = Math.max(leftB, Math.min(rightB, cx));
    const cy = top + n.layer*gapY + nodeH/2;
    N[n.id] = Object.assign({cx,cy}, n);
  });
  // de-overlap pass: keep order by col, enforce min horizontal separation, recenter within canvas
  const byLayer={};
  g.nodes.forEach(n=>{ (byLayer[n.layer]=byLayer[n.layer]||[]).push(N[n.id]); });
  Object.values(byLayer).forEach(row=>{
    row.sort((a,b)=>a.cx-b.cx);
    for(let i=1;i<row.length;i++){ if(row[i].cx < row[i-1].cx+minSep) row[i].cx = row[i-1].cx+minSep; }
    const over = row[row.length-1].cx - rightB; if(over>0) row.forEach(nd=>nd.cx-=over);
    if(row[0].cx < leftB){ const sh=leftB-row[0].cx; row.forEach(nd=>nd.cx+=sh); }
  });
  const edgePath=(s,t)=>{
    if(t.layer>s.layer){ const sy=s.cy+nodeH/2, ty=t.cy-nodeH/2, my=(sy+ty)/2;
      return `M${s.cx},${sy} C${s.cx},${my} ${t.cx},${my} ${t.cx},${ty}`; }
    if(t.layer===s.layer){ const sy=s.cy+nodeH/2, ty=t.cy+nodeH/2, dip=Math.max(sy,ty)+30;
      return `M${s.cx},${sy} C${s.cx},${dip} ${t.cx},${dip} ${t.cx},${ty}`; }
    const sy=s.cy-nodeH/2, ty=t.cy+nodeH/2, off=Math.max(s.cx,t.cx)+72;   // back edge bows right
    return `M${s.cx},${sy} C${off},${sy} ${off},${ty} ${t.cx},${ty}`;
  };
  let svg = `<svg class="flow" viewBox="0 0 ${W} ${H}" role="img" aria-label="Feature flowchart">`+
    `<defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">`+
    `<path d="M0,0 L7,3 L0,6 Z" fill="var(--border-strong)"/></marker>`+
    `<marker id="arrowd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">`+
    `<path d="M0,0 L7,3 L0,6 Z" fill="var(--accent)"/></marker></defs>`;
  // edges
  g.edges.forEach(e=>{
    const s=N[e.from], t=N[e.to]; if(!s||!t)return;
    const d=edgePath(s,t), dash=e.style==='dashed';
    svg += `<path class="edge${dash?' dashed':''}" d="${d}" marker-end="url(#${dash?'arrowd':'arrow'})"/>`;
    if(e.label){ const lx=(s.cx+t.cx)/2, ly=(s.cy+t.cy)/2;
      const w=e.label.length*5.6+8;
      svg += `<rect class="elabel-bg" x="${lx-w/2}" y="${ly-8}" width="${w}" height="15" rx="4"/>`+
             `<text class="elabel" x="${lx}" y="${ly+3.5}" text-anchor="middle">${esc(e.label)}</text>`; }
  });
  // nodes
  g.nodes.forEach(n=>{
    const nn=N[n.id], x=nn.cx-nodeW/2, y=nn.cy-nodeH/2;
    const lines=wrapText((n.status==='risk'?'⚠ ':'')+n.label, 20);
    const ty0 = nn.cy - (lines.length-1)*7;
    const tspans = lines.map((l,i)=>`<text x="${nn.cx}" y="${ty0+i*14}">${esc(l)}</text>`).join('');
    svg += `<g class="node ${n.status}" data-id="${n.id}" tabindex="0">`+
      `<rect x="${x}" y="${y}" width="${nodeW}" height="${nodeH}" rx="9"/>${tspans}</g>`;
  });
  svg += `</svg>`;
  mount.innerHTML = svg;
  // interactivity
  mount.querySelectorAll('g.node').forEach(el=>{
    const pick=()=>{
      mount.querySelectorAll('g.node').forEach(o=>o.classList.remove('sel'));
      el.classList.add('sel');
      const n = DEBRIEF.graph.nodes.find(x=>x.id===el.dataset.id);
      let rel='';
      if(n.section && n.section.startsWith('next-')){ const r=n.section.split('-')[1];
        rel = `<div class="nd-rel">↳ Related to next-step #${esc(r)} below</div>`; }
      detailEl.className='has';
      detailEl.innerHTML = `<b>${esc((n.status==='risk'?'⚠ ':'')+n.label)}</b> — ${esc(n.detail)}${rel}`;
    };
    el.addEventListener('click',pick);
    el.addEventListener('keydown',ev=>{ if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();pick();}});
  });
}

/* ---------- How to see it working ---------- */
const v = DEBRIEF.verify;
const stepsHTML = v.steps.map((s,i)=>{
  const done = !!state.ticks[i];
  return `<div class="step${done?' done':''}" data-i="${i}">`+
    `<input type="checkbox" ${done?'checked':''} data-tick="${i}">`+
    `<div class="s-body"><div class="s-text">${esc(s.text)}</div>`+
    (s.command?`<div class="cmd"><code>${esc(s.command)}</code><button class="copy" data-cmd="${i}">Copy</button></div>`:'')+
    `</div></div>`;
}).join('');
const verifySec = section('verify','How to see it working', v.steps.length+' steps', false,
  stepsHTML+
  `<div class="proof"><div class="pv"><div class="h">What the tests prove</div>${esc(v.testsProve)}</div>`+
  `<div class="ut"><div class="h">Untested</div>${esc(v.untested)}</div></div>`);
verifySec.querySelectorAll('[data-tick]').forEach(cb=>cb.addEventListener('change',()=>{
  const i=cb.dataset.tick; state.ticks[i]=cb.checked; cb.closest('.step').classList.toggle('done',cb.checked); save();
}));
verifySec.querySelectorAll('[data-cmd]').forEach(b=>b.addEventListener('click',()=>{
  copyText(v.steps[b.dataset.cmd].command); b.textContent='Copied'; setTimeout(()=>b.textContent='Copy',1200);
}));

/* ---------- Loose ends (decision capture) ---------- */
const leHTML = DEBRIEF.looseEnds.map(le=>{
  const id=leId(le.title), cur=state.looseEnds[id]||{};
  return `<div class="dec${cur.decision?' decided':''}" data-le="${id}">`+
    `<div class="d-top"><span class="d-title">${esc(le.title)}</span></div>`+
    `<div class="d-detail">${esc(le.detail)}</div>`+
    `<div class="d-controls"><div class="seg" data-seg>`+
      seg('ack','Acknowledge',cur.decision)+seg('defer','Defer',cur.decision)+
    `</div></div>`+
    `<textarea class="note" placeholder="Note (optional)…">${esc(cur.note||'')}</textarea></div>`;
}).join('');
const leSec = section('loose','Loose ends', DEBRIEF.looseEnds.length, false, leHTML);
wireDecisions(leSec, 'le');

/* ---------- What's next (decision capture + next feature) ---------- */
const nsHTML = DEBRIEF.nextSteps.map(ns=>{
  const id=nsId(ns.title), cur=state.nextSteps[id]||{};
  const isNext = state.nextFeature===id;
  return `<div class="dec${cur.decision?' decided':''}" data-ns="${id}">`+
    `<div class="d-top"><span class="rank">${ns.rank}</span><span class="d-title">${esc(ns.title)}</span></div>`+
    `<div class="d-detail">${esc(ns.detail)}</div>`+
    `<div class="d-controls"><div class="seg" data-seg>`+
      seg('approve','Approve',cur.decision)+seg('defer','Defer',cur.decision)+seg('reject','Reject',cur.decision)+
    `</div>`+
    `<label class="nextfeat"><input type="radio" name="nextfeat" ${isNext?'checked':''} data-next="${id}"> next feature</label>`+
    `</div>`+
    `<textarea class="note" placeholder="Note / acceptance hint (optional)…">${esc(cur.note||'')}</textarea></div>`;
}).join('');
const nsSec = section('next','What\'s next — your call', DEBRIEF.nextSteps.length, true,
  nsHTML+`<p class="notyet"><b>Not yet worth worrying about:</b> ${esc(DEBRIEF.notYet)}</p>`);
wireDecisions(nsSec, 'ns');
nsSec.querySelectorAll('[data-next]').forEach(r=>r.addEventListener('change',()=>{
  state.nextFeature = r.checked ? r.dataset.next : null; save();
}));

/* ---------- Open questions (reviewer-added) ---------- */
const oqSec = section('oq','Your open questions for the next run', state.openQuestions.length||null, false,
  `<div class="oq-add"><input id="oq-input" placeholder="Add a question to carry forward…"><button class="btn" id="oq-add">Add</button></div>`+
  `<ul class="oq" id="oq-list"></ul>`);
function renderOQ(){
  const ul=oqSec.querySelector('#oq-list');
  ul.innerHTML = state.openQuestions.map((q,i)=>`<li><span>${esc(q)}</span><button data-oq="${i}" title="Remove">✕</button></li>`).join('')
    || `<li style="color:var(--faint);border:0">None yet.</li>`;
  ul.querySelectorAll('[data-oq]').forEach(b=>b.addEventListener('click',()=>{ state.openQuestions.splice(+b.dataset.oq,1); save(); renderOQ(); updateCount(oqSec, state.openQuestions.length); }));
  const c=oqSec.querySelector('.count'); if(c) c.textContent = state.openQuestions.length;
}
function addOQ(){ const inp=oqSec.querySelector('#oq-input'); const val=inp.value.trim(); if(!val)return; state.openQuestions.push(val); inp.value=''; save(); renderOQ(); updateCount(oqSec, state.openQuestions.length); }
oqSec.querySelector('#oq-add').addEventListener('click',addOQ);
oqSec.querySelector('#oq-input').addEventListener('keydown',e=>{ if(e.key==='Enter')addOQ(); });
renderOQ();
function updateCount(sec,n){ let c=sec.querySelector('.count'); if(!c){ c=document.createElement('span'); c.className='count'; sec.querySelector('.sec-head').insertBefore(c, sec.querySelector('.count')); sec.querySelector('.sec-head').appendChild(c);} c.textContent=n; }

/* ---------- decision wiring helpers ---------- */
function seg(v,label,current){ return `<button data-v="${v}" aria-pressed="${current===v?'true':'false'}">${esc(label)}</button>`; }
function wireDecisions(sec, kind){
  sec.querySelectorAll('.dec').forEach(card=>{
    const id = kind==='ns' ? card.dataset.ns : card.dataset.le;
    const store = kind==='ns' ? state.nextSteps : state.looseEnds;
    card.querySelectorAll('[data-seg] button').forEach(btn=>btn.addEventListener('click',()=>{
      const cur = store[id]||(store[id]={});
      cur.decision = (cur.decision===btn.dataset.v)? null : btn.dataset.v;  // toggle off if same
      card.querySelectorAll('[data-seg] button').forEach(b=>b.setAttribute('aria-pressed', b.dataset.v===cur.decision?'true':'false'));
      card.classList.toggle('decided', !!cur.decision);
      save();
    }));
    const note = card.querySelector('.note');
    note.addEventListener('input',()=>{ const cur=store[id]||(store[id]={}); cur.note=note.value; save(); });
  });
}

/* ---------- progress ---------- */
function updateProgress(){
  const nsTotal=DEBRIEF.nextSteps.length, leTotal=DEBRIEF.looseEnds.length;
  const nsDone=DEBRIEF.nextSteps.filter(n=>state.nextSteps[nsId(n.title)]&&state.nextSteps[nsId(n.title)].decision).length;
  const leDone=DEBRIEF.looseEnds.filter(l=>state.looseEnds[leId(l.title)]&&state.looseEnds[leId(l.title)].decision).length;
  const done=nsDone+leDone, total=nsTotal+leTotal;
  document.getElementById('prog-text').textContent = `${done}/${total} decided`;
  document.getElementById('prog-bar').style.width = total?(100*done/total)+'%':'0';
  const ready = nsDone===nsTotal && state.nextFeature;
  document.getElementById('copy-btn').classList.toggle('ready', !!ready);
}
updateProgress();

/* ---------- copy decisions (markdown + JSON seed) ---------- */
function buildBlock(){
  const decLabel={approve:'APPROVE',defer:'DEFER',reject:'REJECT',ack:'ACK'};
  const nextFeatTitle = (DEBRIEF.nextSteps.find(n=>nsId(n.title)===state.nextFeature)||{}).title || '(none selected)';
  const nsLines = DEBRIEF.nextSteps.map(n=>{ const c=state.nextSteps[nsId(n.title)]||{};
    return `${n.rank}. ${n.title} — ${decLabel[c.decision]||'—'}${c.note?` — "${c.note}"`:''}`; }).join('\n');
  const leLines = DEBRIEF.looseEnds.map(l=>{ const c=state.looseEnds[leId(l.title)]||{};
    return `- ${l.title} — ${decLabel[c.decision]||'—'}${c.note?` — "${c.note}"`:''}`; }).join('\n');
  const oqLines = state.openQuestions.length ? state.openQuestions.map(q=>`- ${q}`).join('\n') : '- (none)';
  const json = {
    feature:m.feature, checkpointDate:m.date,
    source:{path:m.sourcePath,commits:m.commits,branch:m.branch},
    nextFeature: state.nextFeature,
    nextSteps: DEBRIEF.nextSteps.map(n=>{const c=state.nextSteps[nsId(n.title)]||{};return {id:nsId(n.title),title:n.title,decision:c.decision||null,note:c.note||''};}),
    looseEnds: DEBRIEF.looseEnds.map(l=>{const c=state.looseEnds[leId(l.title)]||{};return {id:leId(l.title),title:l.title,decision:c.decision||null,note:c.note||''};}),
    openQuestions: state.openQuestions
  };
  return `## Checkpoint Decisions — ${m.feature} — ${m.date}\n\n`+
    `**Source debrief:** ${m.sourcePath} · **Commits:** ${m.commits} · **Branch:** ${m.branch}\n`+
    `**Chosen next feature:** ${nextFeatTitle}\n\n`+
    `### Next-step decisions\n${nsLines}\n\n`+
    `### Loose ends\n${leLines}\n\n`+
    `### Reviewer open questions\n${oqLines}\n\n`+
    '```json\n'+JSON.stringify(json,null,2)+'\n```\n';
}
function copyText(t){
  if(navigator.clipboard && window.isSecureContext){ navigator.clipboard.writeText(t).catch(()=>fallbackCopy(t)); }
  else fallbackCopy(t);
}
function fallbackCopy(t){ const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta); }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1800); }
document.getElementById('copy-btn').addEventListener('click',()=>{
  copyText(buildBlock());
  const nsTotal=DEBRIEF.nextSteps.length, nsDone=DEBRIEF.nextSteps.filter(n=>(state.nextSteps[nsId(n.title)]||{}).decision).length;
  toast(nsDone<nsTotal ? `Copied — ${nsTotal-nsDone} next-step(s) still undecided` : 'Decisions copied — ready to hand off ✓');
});
</script>
</body>
</html>
