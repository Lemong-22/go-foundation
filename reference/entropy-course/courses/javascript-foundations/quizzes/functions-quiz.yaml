slug: functions-quiz
title: Functions and Control Flow Quiz
pass_threshold: 0.7
questions:
- type: single
  prompt: What does the return keyword do inside a function?
  options:
  - Prints text to the screen
  - Sends a value back to whoever called the function
  - Restarts the program
  - Declares a variable
  correct_indices:
  - 1
  explanation: return hands a value back to the code that called the function, so it can be used or stored.
- type: single
  prompt: 'How many times does this loop run: for (let i = 1; i <= 3; i++) ?'
  options:
  - 2 times
  - 3 times
  - 4 times
  - Forever
  correct_indices:
  - 1
  explanation: i takes the values 1, 2, and 3, so the loop body runs three times.
